# /etc/spigotdl.conf
# Example system-wide config for spigotdl.

# Base directory containing server folders.
SPIGOTDL_MC_ROOT="/opt/mc"

# Directory containing instance config files, example:
# /etc/mc/smp.conf with SERVER_DIR=/opt/mc/smp
SPIGOTDL_CONF_DIR="/etc/mc"

# Variable name used inside /etc/mc/<instance>.conf.
SPIGOTDL_SERVER_DIR_VAR="SERVER_DIR"

# Hide non-server folders from the interactive picker.
SPIGOTDL_EXCLUDE_REGEX='(^$|^\..*|^backups?$|^backup$|^cache$|^logs?$|^plugins?$|^old$|^archive$)'

# Filename mode:
#   file       = original uploaded jar filename when available
#   resource   = Spigot resource/plugin name
#   resourceid = resource-name-resource-id.jar
SPIGOTDL_FILENAME_MODE="file"

# Backup old plugin jar before replacing it.
SPIGOTDL_BACKUP_EXISTING="true"

# Validate downloaded files as jar/zip archives.
SPIGOTDL_REQUIRE_JAR="true"

# Try to match plugin folder owner/group.
SPIGOTDL_AUTO_CHOWN="true"

# Color mode: auto, always, never
SPIGOTDL_COLOR="auto"

# Printed after install.
SPIGOTDL_RESTART_CMD_TEMPLATE='sudo systemctl restart mc@{instance}'
SPIGOTDL_PLUGMAN_CMD_TEMPLATE='plugman load {filename}'
