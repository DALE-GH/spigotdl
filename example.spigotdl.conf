# Example SP-DL config.
# Copy to /etc/spigotdl.conf or ~/.config/spigotdl/config

SPDL_SERVER_ROOTS="/opt/mc"
SPDL_CONF_DIR="/etc/mc"
SPDL_SERVER_DIR_VAR="SERVER_DIR"
SPDL_PLUGINS_DIR_NAME="plugins"
SPDL_EXCLUDE_REGEX='(^$|^\..*|^backups?$|^backup$|^cache$|^logs?$|^plugins?$|^old$|^archive$|^tmp$|^temp$)'

SPDL_REGISTRY_DIR=".spigotdl"
SPDL_REGISTRY_FILE="registry.tsv"

SPDL_BACKUP_EXISTING="true"
SPDL_VALIDATE_JAR="true"
SPDL_AUTO_CHOWN="true"
SPDL_INSTALL_MODE="0644" 
SPDL_COLOR="auto"

SPDL_DEFAULT_SOURCE="spigot" # DEFAULT: spigot - OPTIONS: spigot, modrinth, hangar
SPDL_SEARCH_LIMIT="10"

SPDL_SPIGET_API="https://api.spiget.org/v2"
SPDL_MODRINTH_API="https://api.modrinth.com/v2"
SPDL_HANGAR_API="https://hangar.papermc.io/api/v1"

# Optional post-install command templates - just for fun :p
# Available placeholders: {instance}, {filename}, {dest}, {server_dir}, {plugin_dir}
SPDL_RESTART_CMD_TEMPLATE=''
SPDL_PLUGMAN_CMD_TEMPLATE='plugman load {filename}'

# Examples:
# SPDL_RESTART_CMD_TEMPLATE='sudo systemctl restart minecraft@{instance}'
# SPDL_RESTART_CMD_TEMPLATE='docker restart mc-{instance}'
# SPDL_PLUGMAN_CMD_TEMPLATE='screen -S {instance} -X stuff "plugman load {filename}\015"'
